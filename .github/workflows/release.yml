name: Release

# Publishes a GitHub Release with the self-contained LDWin.exe attached.
#
# Trigger either way:
#   - push a tag like v3.0.0            (git tag v3.0.0 && git push origin v3.0.0)
#   - run manually from the Actions tab and supply the tag (e.g. v3.0.0)
#
# The published exe is self-contained (bundles the .NET runtime), so users can
# download and run it without installing .NET. The binary is NOT committed to the
# repo - it lives on the Release, which keeps the git history small.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/publish (e.g. v3.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (self-contained folder, win-x64) and zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Plain self-contained folder build (NOT single-file): the exe sits next to its
          # DLLs and loads them in place. This avoids the compressed single-file
          # self-extraction-to-%TEMP% pattern, which some AV heuristics treat as packer-like.
          dotnet publish dotnet/LDWin/LDWin.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -o publish
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed ($LASTEXITCODE)" }
          if (-not (Test-Path "publish\LDWin.exe")) { throw "LDWin.exe was not produced" }
          Compress-Archive -Path publish\* -DestinationPath LDWin-win-x64.zip -Force
          Write-Host "Packaged LDWin-win-x64.zip ($((Get-Item 'LDWin-win-x64.zip').Length) bytes)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: LDWin ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: LDWin-win-x64.zip
          body: |
            LDWin — Link Discovery for Windows (CDP/LLDP), Windows 11 / Core Isolation compatible.

            **Download `LDWin-win-x64.zip` below, extract it, and run `LDWin.exe`.** It is a
            self-contained build (no .NET install needed). You also need
            [Npcap](https://npcap.com/) installed, and to run LDWin as administrator.

            > Note: the build is currently unsigned, so Windows SmartScreen may warn on first
            > run ("More info → Run anyway"). A trusted signature is planned.

