name: Build LDWin (.NET)

# CI build of the C# / WinForms LDWin. Produces a single self-contained LDWin.exe
# that captures and decodes CDP/LLDP in-process via SharpPcap/Npcap (no bundled
# tcpdump.exe) and uploads it as a workflow artifact for verification.
#
# Distribution is handled separately by release.yml, which publishes a GitHub
# Release with the exe attached. This workflow does not commit binaries.
#
# Run from the Actions tab ("Run workflow").

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore dotnet/LDWin/LDWin.csproj

      - name: Publish (self-contained single-file win-x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          dotnet publish dotnet/LDWin/LDWin.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -o publish
          if ($LASTEXITCODE -ne 0) { throw "dotnet publish failed ($LASTEXITCODE)" }
          if (-not (Test-Path "publish\LDWin.exe")) { throw "LDWin.exe was not produced" }
          Write-Host "Built publish\LDWin.exe ($((Get-Item 'publish\LDWin.exe').Length) bytes)"

      - name: Upload LDWin.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: LDWin-dotnet
          path: publish/LDWin.exe
          if-no-files-found: error
