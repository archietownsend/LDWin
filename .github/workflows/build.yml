name: Build LDWin

# Full Windows build pipeline, run from the Actions tab ("Run workflow"):
#   1. Build a modern, Npcap-linked tcpdump.exe from the tcpdump sources against the
#      Npcap SDK (which provides wpcap.lib + headers). The resulting tcpdump.exe loads
#      the user's installed Npcap wpcap.dll at runtime - and Npcap's driver is
#      compatible with Windows 11 "Core Isolation > Memory Integrity", which the old
#      bundled Microolap build's private driver was not.
#   2. Compile LDWin.au3 -> LDWin.exe with AutoIt's Aut2Exe (FileInstall embeds the
#      freshly built tcpdump.exe).
#   3. Optionally code-sign both binaries (if CODE_SIGN_PFX_BASE64 / CODE_SIGN_PASSWORD
#      secrets are set) so Windows Defender does not false-flag them.
#   4. Optionally commit the rebuilt tcpdump.exe + LDWin.exe back to the branch.

on:
  workflow_dispatch:
    inputs:
      commit_exe:
        description: "Commit the rebuilt tcpdump.exe and LDWin.exe back to this branch"
        type: boolean
        default: true

permissions:
  contents: write

env:
  NPCAP_SDK_URL: https://npcap.com/dist/npcap-sdk-1.13.zip
  TCPDUMP_TAG: tcpdump-4.99.5

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Step 1: build an Npcap-linked tcpdump.exe from source ----
      - name: Download Npcap SDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri "$env:NPCAP_SDK_URL" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath C:\npcap-sdk -Force
          Get-ChildItem -Recurse C:\npcap-sdk | Select-Object FullName

      - name: Clone tcpdump
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 --branch $env:TCPDUMP_TAG https://github.com/the-tcpdump-group/tcpdump C:\src\tcpdump
          if ($LASTEXITCODE -ne 0) { throw "tcpdump clone failed" }

      - name: Build tcpdump (against the Npcap SDK)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          cmake -S C:\src\tcpdump -B C:\src\tcpdump\build -A Win32 `
            -DCMAKE_PREFIX_PATH="C:\npcap-sdk" `
            -DPCAP_ROOT="C:\npcap-sdk" -DPacket_ROOT="C:\npcap-sdk"
          if ($LASTEXITCODE -ne 0) { throw "tcpdump configure failed ($LASTEXITCODE)" }
          cmake --build C:\src\tcpdump\build --config Release
          if ($LASTEXITCODE -ne 0) { throw "tcpdump build failed ($LASTEXITCODE)" }
          $exe = Get-ChildItem -Recurse C:\src\tcpdump\build -Filter tcpdump.exe | Select-Object -First 1
          if (-not $exe) { throw "tcpdump.exe was not produced" }
          Write-Host "Built $($exe.FullName) ($($exe.Length) bytes)"
          Copy-Item $exe.FullName "$env:GITHUB_WORKSPACE\tcpdump.exe" -Force

      # ---- Code-signing setup (optional) ----
      # Provide repository secrets CODE_SIGN_PFX_BASE64 (base64 of your .pfx) and
      # CODE_SIGN_PASSWORD to sign the binaries. Without them the build still runs and
      # produces unsigned binaries (Windows Defender may flag unsigned AutoIt/sniffer exes).
      - name: Prepare code-signing
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:PFX_B64) {
            [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:PFX_B64))
            $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match '\\x64\\' } | Sort-Object FullName -Descending | Select-Object -First 1
            if (-not $st) { throw "signtool.exe not found on the runner" }
            "SIGNTOOL=$($st.FullName)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            "CERT_PFX=$env:RUNNER_TEMP\cert.pfx" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            "SIGNING=1" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "Code-signing enabled (signtool: $($st.FullName))"
          } else {
            "SIGNING=0" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
            Write-Host "::warning::No CODE_SIGN_PFX_BASE64 secret set - binaries will be left unsigned."
          }

      - name: Sign tcpdump.exe
        shell: pwsh
        env:
          CERT_PW: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:SIGNING -ne '1') { Write-Host "No signing certificate - skipping"; exit 0 }
          & $env:SIGNTOOL sign /f $env:CERT_PFX /p $env:CERT_PW /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 "$PWD\tcpdump.exe"
          if ($LASTEXITCODE -ne 0) { throw "signing tcpdump.exe failed ($LASTEXITCODE)" }

      - name: Upload tcpdump.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcpdump
          path: tcpdump.exe
          if-no-files-found: error

      # ---- Step 2: compile LDWin.exe with the new tcpdump.exe embedded ----
      - name: Install AutoIt3 (provides the Aut2Exe compiler)
        shell: pwsh
        run: choco install autoit --yes --no-progress

      - name: Compile LDWin.au3 -> LDWin.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Prefer the 32-bit Aut2exe.exe (sorts before Aut2exe_x64.exe).
          $aut2exe = Get-ChildItem -Path "C:\Program Files (x86)\AutoIt3","C:\Program Files\AutoIt3" `
            -Recurse -Filter "Aut2exe*.exe" -ErrorAction SilentlyContinue | Sort-Object Name | Select-Object -First 1
          if (-not $aut2exe) { throw "Aut2Exe not found after installing AutoIt3" }
          Write-Host "Compiler: $($aut2exe.FullName)"
          # Remove the checked-out exe so its presence can't mask a failed compile.
          $out = "$PWD\LDWin.exe"
          Remove-Item -Force $out -ErrorAction SilentlyContinue
          # Aut2Exe is a GUI app that does the compile but does not always exit cleanly
          # on a headless runner (it would hang forever under -Wait). So launch it
          # detached and poll for the output file becoming present and size-stable,
          # then terminate the lingering process. FileInstall() resolves relative to
          # the script dir, so pass absolute paths.
          # /comp 0 = no compression (a compressed payload looks more like a packer to AV).
          $argline = @('/in', "$PWD\LDWin.au3", '/out', $out,
                       '/icon', "$PWD\network.ico", '/comp', '0', '/x86')
          $p = Start-Process -FilePath $aut2exe.FullName -ArgumentList $argline -PassThru
          $deadline = (Get-Date).AddMinutes(5)
          $stable = $false
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 3
            if (Test-Path $out) {
              $s1 = (Get-Item $out).Length
              Start-Sleep -Seconds 2
              $s2 = (Get-Item $out).Length
              if ($s1 -gt 0 -and $s1 -eq $s2) { $stable = $true; break }
            }
            if ($p.HasExited) { break }
          }
          # Kill every Aut2Exe/AutoIt helper by name - the GUI process spawns children
          # that linger and would keep the Actions step from ever completing if only the
          # launched PID were terminated.
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          Get-Process -Name "Aut2exe","Aut2exe_x64","AutoIt3" -ErrorAction SilentlyContinue |
            Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2
          if (-not (Test-Path $out) -or (Get-Item $out).Length -le 0) {
            throw "Compilation failed - LDWin.exe was not produced"
          }
          Write-Host "Built LDWin.exe ($((Get-Item $out).Length) bytes, stable=$stable)"

      - name: Stamp version/publisher metadata (rcedit)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Empty version metadata raises an unsigned binary's heuristic score. Stamp proper
          # ProductName/version/publisher fields with rcedit (Aut2Exe alone leaves them blank).
          $rcedit = "$env:RUNNER_TEMP\rcedit-x64.exe"
          Invoke-WebRequest -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" -OutFile $rcedit
          & $rcedit "$PWD\LDWin.exe" `
            --set-version-string "ProductName" "LDWin" `
            --set-version-string "FileDescription" "LDWin - Link Discovery for Windows (CDP/LLDP)" `
            --set-version-string "CompanyName" "Chris Hall" `
            --set-version-string "LegalCopyright" "(c) Chris Hall 2010-2026" `
            --set-version-string "OriginalFilename" "LDWin.exe" `
            --set-file-version "2.3.0.0" `
            --set-product-version "2.3.0.0"
          if ($LASTEXITCODE -ne 0) { throw "rcedit failed ($LASTEXITCODE)" }
          Write-Host "Stamped version metadata onto LDWin.exe"

      - name: Sign LDWin.exe
        shell: pwsh
        env:
          CERT_PW: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:SIGNING -ne '1') { Write-Host "No signing certificate - skipping"; exit 0 }
          & $env:SIGNTOOL sign /f $env:CERT_PFX /p $env:CERT_PW /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 "$PWD\LDWin.exe"
          if ($LASTEXITCODE -ne 0) { throw "signing LDWin.exe failed ($LASTEXITCODE)" }

      - name: Upload LDWin.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: LDWin
          path: LDWin.exe
          if-no-files-found: error

      # LDWin.exe now runs tcpdump.exe from its own folder, so they must ship together.
      - name: Upload release bundle (LDWin.exe + tcpdump.exe)
        uses: actions/upload-artifact@v4
        with:
          name: LDWin-release
          path: |
            LDWin.exe
            tcpdump.exe
          if-no-files-found: error

      # ---- Step 3: commit the rebuilt binaries back ----
      - name: Commit rebuilt binaries
        if: inputs.commit_exe
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tcpdump.exe LDWin.exe
          $changed = (git status --porcelain tcpdump.exe LDWin.exe)
          if (-not $changed) { Write-Host "Binaries unchanged - nothing to commit"; exit 0 }
          git commit -m "CI: rebuild Npcap-linked tcpdump.exe and LDWin.exe [skip ci]"
          git push
